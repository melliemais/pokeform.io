<!DOCTYPE html>

<html>
    <body>
        <form id="pokeform" onsubmit="onSubmit()" method="post">
            <fieldset>
                <h1>Form</h1>
                <h2>Name</h2>
                <input type="text" id="name" required>

                <h2>Type</h2>
                <label for="water">Water</label>
                <input id="water" type="radio" name="type" value="water" required>
                <label for="fire">Fire</label>
                <input id="fire" type="radio" name="type" value="fire" required>
                <label for="rock">Rock</label>
                <input id="rock" type="radio" name="type" value="rock" required>

                <h2>Attack</h2>
                <input id="attack" type="number" required min="0"><br><br>

                <input type="submit">

            </fieldset>
        </form>
    </body>
    <script>
        function onSubmit(){
            let type = "rock";
            if (document.getElementById("water").checked){
                type = "water"
            } else if (document.getElementById("fire").checked){
                type = "fire";
            }
            let jo = {"name": document.getElementById("name").value,
                "type": type,
                "attack": document.getElementById("attack").value
            };
            console.log(JSON.stringify(jo))
        }
    </script>
</html>
