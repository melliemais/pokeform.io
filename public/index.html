<!DOCTYPE html>
<html>
    <header>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </header>
    <body>
        <form id="fullform" onsubmit="onSubmit()" method="post">
                <label for="fullName">Full Name</label>
                <input id="fullName" type="text" required />

                <label for="email">Email Address</label>
                <input id="email" type="email" required />

                <label for="message">Message</label>
                <input id="message" type="textarea" required />

                <input id="submitForm" type="submit" />
        </form>
        <div id="result"></div>
    </body>
    <script>

        function statusCheck(response) {
            if (response.ok) return response;
            // Try to read JSON error bodies like { error: "..." }
            return response.json()
                .then(errData => {
                const msg = errData.error || ('HTTP ' + response.status);
                throw new Error(msg);
                })
                .catch(() => {
                // If the response wasn’t JSON, fall back to a generic message
                throw new Error('HTTP ' + response.status);
        });

        document.getElementById('submitForm').addEventListener('click', () => {
      fetch('/users')
        .then(statusCheck)
        .then(response => response.text())
        .then(text => {
          document.getElementById('result').textContent = text;
        })
        .catch(error => {
          document.getElementById('result').textContent = 'Error: ' + error.message;
        });
    });
    }

        let form = document.getElementById("fullform");
        function handleForm(e) { e.preventDefault(); } 
        form.addEventListener('submit', handleForm);

        async function onSubmit(){
            let fullName = document.getElementById("fullName").value;
            let email = document.getElementById("email").value;
            let message = document.getElementById("message").value;

            let jo = {
                "name": fullName,
                "email": email,
                "message": message
            }

            try{
                const response = await fetch('/users', {
                    method: "POST",
                    headers: {
                        'Content-Type':
                        'application/json'
                    },
                    body: JSON.stringify(jo)
                })
                if (!response.ok) {
                const errData = await response.json();
                throw new Error(errData.error);
                }
                const newMsg = await response.json();
                document.getElementById('result').textContent = JSON.stringify(newMsg);
            }catch (error){
                document.getElementById("result").textContent = JSON.stringify(errData);
            }

        }
    </script>
</html>
